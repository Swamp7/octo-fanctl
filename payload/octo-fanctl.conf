# /etc/octo-fanctl.conf — Octominer fan controller tunables
# Edit values, then: systemctl restart octo-fanctl
# This file is preserved across redeploys (your edits survive).

# --- polling -----------------------------------------------------------------
POLL_SECONDS=10          # seconds between temp reads. Keep >=10: faster cadence
                         # has overloaded the USB controller board in the past.

# --- GPU curve (PRIMARY driver) ----------------------------------------------
# Fan duty is linearly interpolated across this window.
GPU_TEMP_MIN=45          # at/below this GPU temp -> FAN_MIN_PCT
GPU_TEMP_MAX=75          # at/above this GPU temp -> FAN_MAX_PCT
FAN_MIN_PCT=20           # floor duty %  (chassis fans never go below this)
FAN_MAX_PCT=100          # ceiling duty %

# --- CPU override (SECONDARY, raises fans only) ------------------------------
# CPU can push fans ABOVE the GPU curve when it runs hot, but never below, and
# contributes nothing until CPU_TEMP_MIN. Final duty = max(GPU curve, CPU curve).
CPU_OVERRIDE=1           # 0 to disable the CPU override completely
CPU_TEMP_MIN=70          # CPU override starts contributing here
CPU_TEMP_MAX=90          # CPU override reaches FAN_MAX_PCT here

# --- safety ------------------------------------------------------------------
FAILSAFE_PCT=100         # duty on daemon stop, or if GPU temp can't be read

# Board "Default PWM" register (-d). Written ONCE at launch. This is the speed the
# controller falls back to when the host stops driving it, so a dropped/idle host
# keeps the fans running. 100% = 255 PWM. Set full-speed for safety.
DEFAULT_PWM_PCT=100

# Board watchdog: when armed, the controller actively forces the Default PWM if the
# host stops talking within the timeout (i.e. USB/host drop -> fans to Default).
# Off by default (matches stock). Enable for true drop-detection.
WATCHDOG_ENABLE=0
WATCHDOG_SHORT=120       # -w short timeout (s)
WATCHDOG_LONG=732        # -w long timeout (s)

WRITE_DEADBAND=2         # only send a new duty when it moves at least this many %
                         # (reduces USB writes when temps are steady)

# CLI=/opt/octo-fanctl/fan_controller_cli   # normally no need to change
